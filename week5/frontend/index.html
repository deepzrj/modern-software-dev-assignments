<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modern Software Dev Starter</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>Modern Software Dev Starter</h1>

      <section>
        <h2>Notes</h2>
        <form id="note-form">
          <input id="note-title" placeholder="Title" required />
          <input id="note-content" placeholder="Content" required />
          <button type="submit">Add</button>
        </form>
        <ul id="notes"></ul>
        <div>
          <button id="notes-prev" type="button">Prev</button>
          <span id="notes-page"></span>
          <button id="notes-next" type="button">Next</button>
        </div>
      </section>

      <section>
        <h2>Action Items</h2>
        <form id="action-form">
          <input id="action-desc" placeholder="Description" required />
          <button type="submit">Add</button>
        </form>
        <div>
          <select id="action-filter">
            <option value="">All</option>
            <option value="false">Open</option>
            <option value="true">Done</option>
          </select>
          <button id="actions-bulk-complete" type="button">Complete selected</button>
        </div>
        <ul id="actions"></ul>
        <div>
          <button id="actions-prev" type="button">Prev</button>
          <span id="actions-page"></span>
          <button id="actions-next" type="button">Next</button>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
